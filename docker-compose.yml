services:
  postgres:
    image: postgres:15
    container_name: process_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/postgres_data
  
  process_service:
    build: .
    container_name: process_service
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "${HTTP_PORT}:8080"
  
volumes:
  postgres_data: